format = """
${custom.meldr}\
$directory\
$git_branch\
$git_status\
$golang\
$python\
$terraform\
$docker_context\
$cmd_duration\
$line_break\
$character"""

add_newline = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"
truncation_length = 30

[git_status]
style = "bold yellow"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

[golang]
symbol = " "
detect_files = ["go.mod", "go.sum", "go.work"]

[python]
symbol = " "
style = "bold yellow"

[kubernetes]
symbol = "⎈ "
style = "bold blue"
disabled = true

[kubernetes.context_aliases]
"arn:aws:eks:*:*:cluster/*" = "$1"

[terraform]
symbol = "💠 "
style = "bold 105"

[docker_context]
symbol = " "
only_with_files = true

[aws]
disabled = true

[cmd_duration]
min_time = 2000
format = "[⏱ $duration]($style) "
style = "bold yellow"

[package]
disabled = true

[nodejs]
disabled = true

[ruby]
disabled = true

[java]
disabled = true

[php]
disabled = true

[custom.meldr]
command = """d=$PWD; ws=""; wsdir=""; while [ "$d" != / ]; do [ -f "$d/meldr.toml" ] && ws=$(awk -F'"' '/^name/{print $2; exit}' "$d/meldr.toml") && wsdir="$d" && break; d=$(dirname "$d"); done; if [ -n "$ws" ]; then rel="${PWD#"$wsdir/worktrees/"}"; if [ "$rel" != "$PWD" ]; then wt="${rel%%/*}"; echo "$ws/$wt"; else echo "$ws"; fi; fi"""
when = "d=$PWD; while [ \"$d\" != / ]; do [ -f \"$d/meldr.toml\" ] && exit 0; d=$(dirname \"$d\"); done; exit 1"
symbol = "⚙ "
style = "bold 208"
format = "[$symbol$output]($style) "
