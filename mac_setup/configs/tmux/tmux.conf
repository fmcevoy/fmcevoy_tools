# =============================================================================
# tmux.conf - managed by mac_setup
# =============================================================================

# ---------------------------------------------------------------------------
# Prefix
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------------------------------------
# Splits & windows
# ---------------------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane switching with Alt-Arrow (no prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ---------------------------------------------------------------------------
# Core settings
# ---------------------------------------------------------------------------
set -g mouse on
set -g base-index 0
set -g pane-base-index 0
set -g history-limit 50000
set -sg escape-time 0
set -g monitor-activity on
set -g visual-activity off

# True color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# ---------------------------------------------------------------------------
# Catppuccin theme (v2.1.3)
# ---------------------------------------------------------------------------
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g status-left ""
set -g @catppuccin_status_modules_right "session date_time"
set -g @catppuccin_date_time_text "%H:%M  %d %b"
set -g @catppuccin_window_text "#W"

# ---------------------------------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'tmux-plugins/tmux-cowboy'
set -g @plugin 'sainnhe/tmux-fzf'

# Resurrect
set -g @resurrect-capture-pane-contents 'on'

# Continuum
set -g @continuum-save-interval '15'
set -g @continuum-restore 'off'

# Extrakto
set -g @extrakto_split_direction 'v'
set -g @extrakto_split_size '7'

# tmux-fzf
TMUX_FZF_LAUNCH_KEY="F"

# ---------------------------------------------------------------------------
# Initialize TPM (MUST be at end)
# ---------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'

# ---------------------------------------------------------------------------
# Window naming (AFTER plugins to prevent overrides)
# ---------------------------------------------------------------------------
set -g allow-rename off
set -g automatic-rename off
