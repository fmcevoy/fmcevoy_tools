# =============================================================================
# tmux.conf - managed by mac_setup
# =============================================================================

# ---------------------------------------------------------------------------
# Prefix
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------------------------------------
# Splits & windows
# ---------------------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane switching with Alt-Arrow (no prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ---------------------------------------------------------------------------
# Core settings
# ---------------------------------------------------------------------------
set -g mouse on
set -g base-index 0
set -g pane-base-index 0
set -g history-limit 50000
set -sg escape-time 0
set -g monitor-activity on
set -g visual-activity off

# True color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# ---------------------------------------------------------------------------
# Tokyo Night theme (manual — matches nvim tokyonight-night)
# ---------------------------------------------------------------------------
# Palette
TN_BG="#1a1b26"
TN_FG="#c0caf5"
TN_BLACK="#15161e"
TN_BLUE="#7aa2f7"
TN_CYAN="#7dcfff"
TN_GREEN="#9ece6a"
TN_GREY="#414868"
TN_DARK="#24283b"

set -g status-style "bg=${TN_BG},fg=${TN_FG}"
set -g status-left "#[bg=${TN_BLUE},fg=${TN_BLACK},bold]  #S #[bg=${TN_BG}] "
set -g status-left-length 30
set -g status-right "#[fg=${TN_GREY}]%H:%M  %d %b "
set -g status-right-length 30

# Window tabs
set -g window-status-format "#[fg=${TN_DARK},bg=${TN_BG}]#[fg=${TN_FG},bg=${TN_DARK}] #I:#W #[fg=${TN_DARK},bg=${TN_BG}] "
set -g window-status-current-format "#[fg=${TN_BLUE},bg=${TN_BG}]#[fg=#ffffff,bg=${TN_BLUE},bold] #I:#W #[fg=${TN_BLUE},bg=${TN_BG}] "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=${TN_GREY}"
set -g pane-active-border-style "fg=${TN_BLUE}"

# Message & command line
set -g message-style "bg=${TN_DARK},fg=${TN_CYAN}"
set -g message-command-style "bg=${TN_DARK},fg=${TN_CYAN}"

# ---------------------------------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'tmux-plugins/tmux-cowboy'
set -g @plugin 'sainnhe/tmux-fzf'

# Resurrect
set -g @resurrect-capture-pane-contents 'on'

# Continuum
set -g @continuum-save-interval '15'
set -g @continuum-restore 'off'

# Extrakto
set -g @extrakto_split_direction 'v'
set -g @extrakto_split_size '7'

# tmux-fzf
TMUX_FZF_LAUNCH_KEY="F"

# ---------------------------------------------------------------------------
# Initialize TPM (MUST be at end)
# ---------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'

# ---------------------------------------------------------------------------
# Window naming (AFTER plugins to prevent overrides)
# ---------------------------------------------------------------------------
set -g allow-rename off
set -g automatic-rename off
